# Configuración de Fly.io.
# Si el nombre "finanzas-jz" está ocupado, cambialo acá y usá el mismo en los comandos.
app = "finanzas-jz"
primary_region = "eze"   # Buenos Aires. Alternativa: "gru" (São Paulo)

[build]

[http_service]
  internal_port = 8080          # el puerto donde escucha uvicorn dentro del contenedor
  force_https = true
  auto_stop_machines = "stop"   # apaga la máquina cuando no se usa (ahorra plata)
  auto_start_machines = true
  min_machines_running = 0

# Volumen persistente: acá vive gastos.db, así los datos NO se borran al redeployar.
[mounts]
  source = "gastos_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
