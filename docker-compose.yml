# Stack para la VM (Oracle/VPS): base Postgres + app + Caddy (HTTPS automático).
# Las variables salen de un archivo .env en esta misma carpeta (ver .env.example).
# Levantar con:  docker compose up -d --build

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: gastos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: gastos
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gastos"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://gastos:${POSTGRES_PASSWORD}@db:5432/gastos
      IA_PROVIDER: groq
      GROQ_API_KEY: ${GROQ_API_KEY}
      SECRET_KEY: ${SECRET_KEY}
      COOKIE_SECURE: "true"
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8080"

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMINIO: ${DOMINIO}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  pgdata:
  caddy_data:
  caddy_config:
